<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Chat</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="site-shell app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mock Agent Runtime</p>
          <h1>Agent 对话界面</h1>
        </div>
        <nav class="topnav">
          <a class="active" href="/chat">Agent Chat</a>
          <a href="/wiki">Wiki Browser</a>
        </nav>
      </header>

      <main class="app-grid">
        <aside class="panel side-panel">
          <section>
            <p class="eyebrow">Status</p>
            <h2>当前后端行为</h2>
            <p>
              这里还没有接真实模型，<code>/api/chat</code>
              会根据本地 wiki 的关键词匹配结果生成一段模拟回复。
            </p>
          </section>

          <section>
            <p class="eyebrow">Try Asking</p>
            <div id="suggestions" class="chip-list"></div>
          </section>

          <section class="mini-card">
            <p class="mini-label">接真 agent 时</p>
            <p>把这个 mock API 替换成后台 worker 调 agent runtime 的结果即可。</p>
          </section>
        </aside>

        <section class="panel chat-panel">
          <div id="messages" class="messages"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="chat-input"
              name="message"
              rows="3"
              placeholder="问点什么，比如：这个方向有哪些值得做的 gap？"
            ></textarea>
            <div class="chat-actions">
              <p class="helper-text">当前是模拟答复，但会真实检索本地 wiki 页面。</p>
              <button class="button button-primary" type="submit">发送</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="/assets/chat.js"></script>
  </body>
</html>
